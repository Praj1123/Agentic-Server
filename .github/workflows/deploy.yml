name: Deploy Vira

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create app directory
            sudo mkdir -p /opt/vira
            sudo chown $USER:$USER /opt/vira

            # Pull latest code
            if [ -d "/opt/vira/.git" ]; then
              cd /opt/vira && git pull
            else
              rm -rf /opt/vira/*
              git clone https://github.com/${{ github.repository }}.git /opt/vira
            fi

            # Create projects directory
            mkdir -p ~/.vira/projects

            # Install dependencies
            cd /opt/vira/web/backend
            npm install --omit=dev

            # Setup systemd service (first time only)
            if [ ! -f /etc/systemd/system/vira.service ]; then
              sudo tee /etc/systemd/system/vira.service > /dev/null << 'EOF'
            [Unit]
            Description=Vira
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/opt/vira/web/backend
            ExecStart=/usr/bin/node server.js
            Restart=always
            Environment=PORT=3001
            Environment=PROJECTS_DIR=/home/ubuntu/.vira/projects

            [Install]
            WantedBy=multi-user.target
            EOF
              sudo systemctl daemon-reload
              sudo systemctl enable vira
            fi

            # Restart service
            sudo systemctl stop vira || true
            sleep 1
            sudo kill -9 $(sudo lsof -t -i:3001) 2>/dev/null || true
            sudo systemctl start vira
            echo "✅ Deployed and running"
