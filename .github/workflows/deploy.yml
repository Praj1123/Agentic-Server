name: Deploy Infra Agent

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Create app directory
            sudo mkdir -p /opt/infra-agent
            sudo chown $USER:$USER /opt/infra-agent

            # Pull latest code
            if [ -d "/opt/infra-agent/.git" ]; then
              cd /opt/infra-agent && git pull
            else
              git clone https://github.com/${{ github.repository }}.git /opt/infra-agent
            fi

            # Install dependencies
            cd /opt/infra-agent/web/backend
            npm install --production

            # Setup systemd service (first time only)
            if [ ! -f /etc/systemd/system/infra-agent.service ]; then
              sudo tee /etc/systemd/system/infra-agent.service > /dev/null <<EOF
            [Unit]
            Description=Infrastructure Agent
            After=network.target

            [Service]
            Type=simple
            User=$USER
            WorkingDirectory=/opt/infra-agent/web/backend
            ExecStart=/usr/bin/node server.js
            Restart=always
            Environment=PORT=3001
            Environment=PROJECTS_DIR=/home/$USER/.infra-agent/projects

            [Install]
            WantedBy=multi-user.target
            EOF
              sudo systemctl daemon-reload
              sudo systemctl enable infra-agent
            fi

            # Restart service
            sudo systemctl restart infra-agent
            echo "✅ Deployed and running"
