<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Vira — Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f8f9fb; min-height: 100vh; color: #1a1a2e; }
        .brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; letter-spacing: -0.5px; }

        /* Top Nav */
        .topnav { background: #fff; border-bottom: 1px solid #e5e7eb; padding: 0 32px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topnav-left { display: flex; align-items: center; gap: 12px; }
        .topnav-left h1 { font-size: 15px; font-weight: 600; color: #1a1a2e; }
        .ai-face { width: 32px; height: 32px; position: relative; display: inline-flex; align-items: center; justify-content: center; }
        .ai-face .orb { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 0 10px rgba(99,102,241,0.3); position: relative; animation: breathe 4s ease-in-out infinite; }
        .ai-face .orb::after { content: ''; position: absolute; top: 4px; left: 6px; width: 7px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        .ai-face .eye { position: absolute; width: 3px; height: 3px; background: white; border-radius: 50%; top: 50%; animation: blink 5s infinite; }
        .ai-face .eye.left { left: 9px; }
        .ai-face .eye.right { right: 9px; }
        .ai-face .mouth { position: absolute; bottom: 9px; left: 50%; transform: translateX(-50%); width: 6px; height: 2px; background: rgba(255,255,255,0.5); border-radius: 4px; }
        @keyframes breathe { 0%, 100% { box-shadow: 0 0 10px rgba(99,102,241,0.3); transform: scale(1); } 50% { box-shadow: 0 0 14px rgba(99,102,241,0.4); transform: scale(1.02); } }
        @keyframes blink { 0%, 92%, 100% { transform: translateY(-50%) scaleY(1); } 95% { transform: translateY(-50%) scaleY(0.1); } }
        .topnav-right { display: flex; align-items: center; gap: 16px; }
        .topnav-right a { font-size: 13px; color: #6b7280; text-decoration: none; font-weight: 500; transition: color 0.15s; }
        .topnav-right a:hover { color: #1a1a2e; }
        .topnav-right .btn-logout { color: #dc2626; }

        .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; }
        .stat .label { font-size: 12px; color: #6b7280; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .stat .value { font-size: 28px; font-weight: 700; color: #1a1a2e; }

        /* Cards */
        .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; margin-bottom: 24px; }
        .card-header { padding: 18px 24px; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; }
        .card-header h2 { font-size: 14px; font-weight: 600; color: #1a1a2e; }
        .card-body { padding: 20px 24px; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: #6b7280; font-weight: 600; border-bottom: 1px solid #f3f4f6; }
        td { padding: 12px; font-size: 13px; color: #374151; border-bottom: 1px solid #f9fafb; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f9fafb; }

        .badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; display: inline-block; }
        .badge.admin { background: #ede9fe; color: #5b21b6; }
        .badge.user { background: #ecfdf5; color: #065f46; }

        .project-tags { display: flex; gap: 4px; flex-wrap: wrap; }
        .project-tag { background: #f0f4ff; color: #3b5998; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
        .project-tag .x { cursor: pointer; opacity: 0.5; font-size: 13px; line-height: 1; }
        .project-tag .x:hover { opacity: 1; color: #dc2626; }

        /* Forms */
        .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input, .form-group select { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; font-size: 13px; color: #1a1a2e; transition: border-color 0.15s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,0.08); }

        .checkbox-group { position: relative; }
        .checkbox-toggle { background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; font-size: 12px; color: #374151; cursor: pointer; min-width: 160px; display: flex; justify-content: space-between; align-items: center; }
        .checkbox-toggle:hover { border-color: #4f46e5; }
        .checkbox-dropdown { display: none; position: absolute; top: 100%; left: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 6px; margin-top: 4px; min-width: 180px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); z-index: 10; max-height: 140px; overflow-y: auto; }
        .checkbox-dropdown.open { display: block; }
        .checkbox-dropdown label { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #374151; cursor: pointer; padding: 5px 8px; border-radius: 4px; }
        .checkbox-dropdown label:hover { background: #f9fafb; }
        .checkbox-dropdown input[type="checkbox"] { accent-color: #4f46e5; }
        .selected-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
        .selected-tag { background: #ede9fe; color: #5b21b6; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 500; }

        /* Buttons */
        .btn { padding: 8px 14px; border-radius: 6px; border: none; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
        .btn-primary { background: #4f46e5; color: #fff; }
        .btn-primary:hover { background: #4338ca; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .btn-outline { background: #fff; border: 1px solid #d1d5db; color: #374151; }
        .btn-outline:hover { border-color: #9ca3af; background: #f9fafb; }
        .btn-danger { background: #fff; border: 1px solid #fecaca; color: #dc2626; }
        .btn-danger:hover { background: #fef2f2; }
        .btn-assign { background: none; border: 1px dashed #d1d5db; border-radius: 4px; padding: 2px 8px; font-size: 10px; color: #6b7280; cursor: pointer; margin-top: 4px; }
        .btn-assign:hover { border-color: #4f46e5; color: #4f46e5; }

        .actions { display: flex; gap: 6px; }

        .assign-dropdown { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; margin-top: 6px; box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
        .assign-dropdown label { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 6px; border-radius: 4px; cursor: pointer; }
        .assign-dropdown label:hover { background: #f9fafb; }
        .assign-dropdown input { accent-color: #4f46e5; }

        .msg { font-size: 12px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-weight: 500; }
        .msg.ok { background: #ecfdf5; color: #065f46; border: 1px solid #d1fae5; }
        .msg.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        /* Animations */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .stat { animation: fadeUp 0.3s ease-out both; }
        .stat:nth-child(2) { animation-delay: 0.05s; }
        .stat:nth-child(3) { animation-delay: 0.1s; }
        .card { animation: fadeUp 0.3s ease-out both; animation-delay: 0.15s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.25s; }
        tr { animation: fadeUp 0.2s ease-out both; }
        .btn { transition: background 0.15s ease, border-color 0.15s ease; }
        .form-group input, .form-group select { transition: border-color 0.15s ease, box-shadow 0.15s ease; }

        .divider { border-top: 1px solid #f3f4f6; margin: 20px 0; }
        .sub-title { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 14px; }

        /* Layout */
        .layout { display: flex; height: calc(100vh - 56px); }
        .sidebar { width: 220px; background: #fff; border-right: 1px solid #e5e7eb; padding: 20px 0; display: flex; flex-direction: column; justify-content: space-between; }
        .sidebar-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
        .sidebar-nav a { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 6px; font-size: 13px; color: #4b5563; text-decoration: none; font-weight: 500; transition: all 0.15s; }
        .sidebar-nav a:hover { background: #f3f4f6; color: #1a1a2e; }
        .sidebar-nav a.active { background: #eef2ff; color: #4f46e5; font-weight: 600; }
        .sidebar-nav .icon { width: 18px; text-align: center; font-size: 14px; }
        .sidebar-footer { padding: 12px 16px; border-top: 1px solid #f3f4f6; }
        .sidebar-footer .user-info { font-size: 11px; color: #6b7280; line-height: 1.5; }
        .sidebar-footer .user-name { font-size: 12px; font-weight: 600; color: #374151; }
        .page { flex: 1; overflow-y: auto; padding: 28px 32px; }

        /* Sections */
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>
    <div class="topnav">
        <div class="topnav-left">
            <div class="ai-face"><div class="orb"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span></div></div>
            <h1><span class="brand">Vira</span> <span style="font-weight:400;color:#6b7280;font-size:13px">/ Admin</span></h1>
        </div>
        <div class="topnav-right">
            <span id="adminProfile" style="font-size:12px;color:#6b7280"></span>
            <a href="/">← Back to Chat</a>
            <a href="#" class="btn-logout" onclick="logout()">Logout</a>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="sidebar-nav">
                <a href="#" class="active" onclick="showSection('overview', this)"><span class="icon">📊</span> Overview</a>
                <a href="#" onclick="showSection('projects', this)"><span class="icon">📁</span> Projects</a>
                <a href="#" onclick="showSection('users', this)"><span class="icon">👥</span> Users</a>
                <a href="#" onclick="showSection('settings', this)"><span class="icon">⚙️</span> Settings</a>
            </div>
            <div class="sidebar-footer">
                <div class="user-name" id="sidebarName">—</div>
                <div class="user-info" id="sidebarEmail">—</div>
            </div>
        </div>

        <div class="page">
            <!-- Overview -->
            <div class="section active" id="sec-overview">
                <div class="stats" id="stats"></div>
                <div class="card">
                    <div class="card-header"><h2>Projects</h2></div>
                    <div class="card-body" style="padding:0">
                        <table>
                            <thead><tr><th>Project</th><th>Today</th><th>This Week</th><th>Users</th><th></th></tr></thead>
                            <tbody id="projectsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Projects -->
            <div class="section" id="sec-projects">
                <div class="card">
                    <div class="card-header"><h2>Create Project</h2></div>
                    <div class="card-body">
                        <div class="form-row">
                            <div class="form-group"><label>Project Name</label><input type="text" id="newProjName" placeholder="my-project"></div>
                            <div class="form-group"><label>Region</label><input type="text" id="newProjRegion" value="us-east-1"></div>
                            <button class="btn btn-primary" onclick="createProject()">Create</button>
                        </div>
                        <div id="projMsg" class="msg" style="display:none"></div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header"><h2>All Projects</h2></div>
                    <div class="card-body" style="padding:0">
                        <table>
                            <thead><tr><th>Project</th><th>Today</th><th>This Week</th><th>Users</th><th></th></tr></thead>
                            <tbody id="projectsTable2"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Users -->
            <div class="section" id="sec-users">
                <div class="card">
                    <div class="card-header"><h2>Users</h2></div>
                    <div class="card-body" style="padding:0 0 20px 0">
                        <table>
                            <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Projects</th><th></th></tr></thead>
                            <tbody id="usersTable"></tbody>
                        </table>
                        <div style="padding: 0 24px">
                            <div class="divider"></div>
                            <div class="sub-title">Add User</div>
                            <div class="form-row">
                                <div class="form-group"><label>Email</label><input type="email" id="newEmail" placeholder="user@company.com"></div>
                                <div class="form-group"><label>Password</label><input type="password" id="newPass" placeholder="min 8 chars"></div>
                                <div class="form-group"><label>Role</label><select id="newRole"><option value="user">User</option><option value="admin">Admin</option></select></div>
                                <div class="form-group"><label>Projects</label><div class="checkbox-group"><div class="checkbox-toggle" onclick="toggleDropdown()">Select ▾</div><div class="checkbox-dropdown" id="newProjects"></div><div class="selected-tags" id="selectedTags"></div></div></div>
                                <button class="btn btn-primary" onclick="addUser()">Add</button>
                            </div>
                            <div id="msg" class="msg" style="display:none"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Settings -->
            <div class="section" id="sec-settings">
                <div class="card">
                    <div class="card-header"><h2>Settings</h2></div>
                    <div class="card-body">
                        <div class="sub-title">Change Password</div>
                        <div class="form-row">
                            <div class="form-group"><label>Current Password</label><input type="password" id="adminCurrentPw"></div>
                            <div class="form-group"><label>New Password</label><input type="password" id="adminNewPw" placeholder="min 8 chars"></div>
                            <button class="btn btn-primary" onclick="adminChangePw()">Update</button>
                        </div>
                        <div id="pwMsg" class="msg" style="display:none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        const token = localStorage.getItem('token');
        if (!token) location.href = '/';
        function headers() { return { 'Content-Type': 'application/json', 'Authorization': token }; }
        function logout() { if (!confirm('Are you sure you want to logout?')) return; localStorage.removeItem('token'); localStorage.removeItem('role'); location.href = '/'; }

        function showSection(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('sec-' + id).classList.add('active');
            document.querySelectorAll('.sidebar-nav a').forEach(a => a.classList.remove('active'));
            if (el) el.classList.add('active');
        }

        async function adminChangePw() {
            const current = document.getElementById('adminCurrentPw').value;
            const newPw = document.getElementById('adminNewPw').value;
            const msg = document.getElementById('pwMsg');
            const res = await fetch(`${API}/change-password`, { method: 'POST', headers: headers(), body: JSON.stringify({ currentPassword: current, newPassword: newPw }) });
            const data = await res.json();
            msg.style.display = 'block'; msg.className = data.success ? 'msg ok' : 'msg err'; msg.textContent = data.success ? 'Password updated' : data.error;
        }

        loadAll();

        async function loadAll() {
            const me = await fetch(`${API}/me`, { headers: headers() });
            if (me.status === 401) { location.href = '/'; return; }
            const meData = await me.json();
            if (meData.role !== 'admin') { document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:16px;color:#6b7280">Access denied</div>'; return; }
            document.getElementById('adminProfile').textContent = `${meData.name} (${meData.email})`;
            document.getElementById('sidebarName').textContent = meData.name;
            document.getElementById('sidebarEmail').textContent = meData.email;

            const usersRes = await fetch(`${API}/admin/users`, { headers: headers() });
            const usersData = await usersRes.json();
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '';
            let totalUsers = 0;
            Object.entries(usersData.users).forEach(([email, u]) => {
                totalUsers++;
                let tags;
                if (u.role === 'admin') { tags = '<span style="color:#6b7280;font-size:11px">All (admin)</span>'; }
                else if (u.projects && u.projects.length > 0) { tags = u.projects.map(p => `<span class="project-tag">${p} <span class="x" onclick="unassignProject('${encodeURIComponent(email)}','${p}')">×</span></span>`).join(''); }
                else { tags = '<span style="color:#9ca3af;font-size:11px">None</span>'; }
                tbody.innerHTML += `<tr>
                    <td><strong>${email}</strong></td>
                    <td>${u.name || '-'}</td>
                    <td><span class="badge ${u.role}">${u.role}</span></td>
                    <td><div class="project-tags">${tags}</div>${u.role !== 'admin' ? `<button class="btn-assign" onclick="openAssign('${encodeURIComponent(email)}', this)">+ Assign</button>` : ''}</td>
                    <td><div class="actions"><button class="btn btn-sm btn-outline" onclick="resetUserPw('${encodeURIComponent(email)}')">Reset PW</button><button class="btn btn-sm btn-danger" onclick="removeUser('${encodeURIComponent(email)}')">Remove</button></div></td>
                </tr>`;
            });

            const projRes = await fetch(`${API}/projects`, { headers: headers() });
            const projData = await projRes.json();
            const ptbody = document.getElementById('projectsTable');
            const ptbody2 = document.getElementById('projectsTable2');
            ptbody.innerHTML = '';
            ptbody2.innerHTML = '';
            const projSelect = document.getElementById('newProjects');
            projSelect.innerHTML = '';
            let totalQueries = 0;
            for (const p of projData.projects) {
                projSelect.innerHTML += `<label><input type="checkbox" value="${p.name}" onchange="updateTags()"> ${p.name}</label>`;
                let todayQ = 0, weekQ = 0;
                try {
                    const uRes = await fetch(`${API}/usage/${p.name}`, { headers: headers() });
                    const uData = await uRes.json();
                    const today = new Date().toISOString().split('T')[0];
                    todayQ = uData.usage[today]?.queries || 0;
                    weekQ = Object.entries(uData.usage).filter(([d]) => new Date(d) > new Date(Date.now() - 7*86400000)).reduce((s, [,v]) => s + v.queries, 0);
                } catch(e) {}
                totalQueries += weekQ;
                ptbody.innerHTML += `<tr><td><strong>${p.name}</strong></td><td>${todayQ}</td><td>${weekQ}</td><td>—</td><td><button class="btn btn-sm btn-danger" onclick="deleteProject('${p.name}')">Delete</button></td></tr>`;
                ptbody2.innerHTML += `<tr><td><strong>${p.name}</strong></td><td>${todayQ}</td><td>${weekQ}</td><td>—</td><td><button class="btn btn-sm btn-danger" onclick="deleteProject('${p.name}')">Delete</button></td></tr>`;
            }

            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="label">Users</div><div class="value">${totalUsers}</div></div>
                <div class="stat"><div class="label">Projects</div><div class="value">${projData.projects.length}</div></div>
                <div class="stat"><div class="label">Queries (7d)</div><div class="value">${totalQueries}</div></div>
            `;
        }

        async function addUser() {
            const email = document.getElementById('newEmail').value;
            const password = document.getElementById('newPass').value;
            const role = document.getElementById('newRole').value;
            const projects = Array.from(document.querySelectorAll('#newProjects input:checked')).map(cb => cb.value);
            const msg = document.getElementById('msg');
            const res = await fetch(`${API}/admin/users`, { method: 'POST', headers: headers(), body: JSON.stringify({ email, password, role, projects }) });
            const data = await res.json();
            msg.style.display = 'block';
            msg.className = data.success ? 'msg ok' : 'msg err';
            msg.textContent = data.success ? `User added${data.emailSent ? ' — credentials emailed' : ''}` : data.error;
            if (data.success) { document.getElementById('newEmail').value = ''; document.getElementById('newPass').value = ''; loadAll(); }
        }

        async function removeUser(email) { if (!confirm('Remove this user?')) return; await fetch(`${API}/admin/users/${email}`, { method: 'DELETE', headers: headers() }); loadAll(); }
        async function resetUserPw(email) { const pw = prompt('Enter new password (min 8 chars):'); if (!pw || pw.length < 8) return alert('Password must be at least 8 characters'); const res = await fetch(`${API}/reset-password`, { method: 'POST', headers: headers(), body: JSON.stringify({ email: decodeURIComponent(email), newPassword: pw }) }); const data = await res.json(); alert(data.success ? 'Password reset successfully' : data.error); }
        async function unassignProject(email, project) { await fetch(`${API}/admin/users/${email}/projects/${project}`, { method: 'DELETE', headers: headers() }); loadAll(); }

        async function openAssign(email, btn) {
            const projRes = await fetch(`${API}/projects`, { headers: headers() });
            const projData = await projRes.json();
            const usersRes = await fetch(`${API}/admin/users`, { headers: headers() });
            const usersData = await usersRes.json();
            const decoded = decodeURIComponent(email);
            const current = usersData.users[decoded]?.projects || [];
            const available = projData.projects.filter(p => !current.includes(p.name));
            if (!available.length) { alert('All projects assigned.'); return; }
            const row = btn.parentElement;
            const existing = row.querySelector('.assign-dropdown');
            if (existing) { existing.remove(); return; }
            const dd = document.createElement('div');
            dd.className = 'assign-dropdown';
            dd.innerHTML = available.map(p => `<label><input type="checkbox" value="${p.name}"> ${p.name}</label>`).join('') + `<button class="btn btn-sm btn-primary" style="margin-top:6px;width:100%" onclick="saveAssign('${email}')">Save</button>`;
            row.appendChild(dd);
        }

        async function saveAssign(email) {
            const cbs = document.querySelectorAll('.assign-dropdown input:checked');
            for (const cb of cbs) await fetch(`${API}/admin/users/${email}/projects`, { method: 'POST', headers: headers(), body: JSON.stringify({ project: cb.value }) });
            loadAll();
        }

        function toggleDropdown() { document.getElementById('newProjects').classList.toggle('open'); }
        function updateTags() {
            const checked = Array.from(document.querySelectorAll('#newProjects input:checked')).map(cb => cb.value);
            document.getElementById('selectedTags').innerHTML = checked.map(p => `<span class="selected-tag">${p}</span>`).join('');
        }
        document.addEventListener('click', (e) => { if (!e.target.closest('.checkbox-group')) document.getElementById('newProjects')?.classList.remove('open'); });

        async function createProject() {
            const name = document.getElementById('newProjName').value.trim();
            const region = document.getElementById('newProjRegion').value.trim() || 'us-east-1';
            const msg = document.getElementById('projMsg');
            if (!name) { msg.style.display = 'block'; msg.className = 'msg err'; msg.textContent = 'Name required'; return; }
            const res = await fetch(`${API}/projects`, { method: 'POST', headers: headers(), body: JSON.stringify({ name, region }) });
            const data = await res.json();
            msg.style.display = 'block'; msg.className = data.success ? 'msg ok' : 'msg err'; msg.textContent = data.success ? 'Project created' : data.error;
            if (data.success) { document.getElementById('newProjName').value = ''; loadAll(); }
        }

        async function deleteProject(name) { if (!confirm(`Delete "${name}"? This cannot be undone.`)) return; await fetch(`${API}/projects/${name}`, { method: 'DELETE', headers: headers() }); loadAll(); }
    </script>
</body>
</html>
