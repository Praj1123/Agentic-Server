<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1419; color: #e7e9ea; height: 100vh; display: flex; flex-direction: column; }
        .header { padding: 16px 24px; background: #1a1f2e; border-bottom: 1px solid #2d3748; display: flex; align-items: center; gap: 12px; }
        .header .dot { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .header h1 { font-size: 18px; font-weight: 600; flex: 1; }
        .header select { background: #0f1419; border: 1px solid #2d3748; border-radius: 6px; padding: 6px 12px; color: #e7e9ea; font-size: 13px; }
        .header .btn-new { background: #1d4ed8; border: none; border-radius: 6px; padding: 6px 14px; color: white; font-size: 13px; cursor: pointer; }
        .header .btn-new:hover { background: #2563eb; }
        .header .btn-creds { background: #374151; border: none; border-radius: 6px; padding: 6px 14px; color: #9ca3af; font-size: 13px; cursor: pointer; }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; font-size: 14px; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #1d4ed8; border-bottom-right-radius: 4px; }
        .message.agent { align-self: flex-start; background: #1a1f2e; border: 1px solid #2d3748; border-bottom-left-radius: 4px; }
        .message.agent code { background: #2d3748; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .message.agent pre { background: #0d1117; padding: 12px; border-radius: 8px; margin: 8px 0; overflow-x: auto; }
        .message.agent pre code { background: none; padding: 0; }
        .typing { align-self: flex-start; padding: 12px 16px; background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; }
        .typing span { display: inline-block; width: 8px; height: 8px; background: #60a5fa; border-radius: 50%; animation: bounce 1.4s infinite; margin: 0 2px; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        .input-area { padding: 16px 24px; background: #1a1f2e; border-top: 1px solid #2d3748; }
        .input-wrapper { display: flex; gap: 12px; max-width: 900px; margin: 0 auto; }
        .input-wrapper textarea { flex: 1; background: #0f1419; border: 1px solid #2d3748; border-radius: 8px; padding: 12px 16px; color: #e7e9ea; font-size: 14px; resize: none; height: 48px; font-family: inherit; }
        .input-wrapper textarea:focus { outline: none; border-color: #60a5fa; }
        .input-wrapper button { background: #1d4ed8; border: none; border-radius: 8px; padding: 0 20px; color: white; font-size: 14px; cursor: pointer; font-weight: 500; }
        .input-wrapper button:hover { background: #2563eb; }
        .input-wrapper button:disabled { background: #374151; cursor: not-allowed; }
        /* Modal styles */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; padding: 24px; width: 420px; }
        .modal h2 { margin-bottom: 16px; font-size: 16px; }
        .modal label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #9ca3af; margin-bottom: 12px; }
        .modal input { background: #0f1419; border: 1px solid #2d3748; border-radius: 6px; padding: 8px 12px; color: #e7e9ea; font-size: 14px; }
        .modal input:focus { outline: none; border-color: #60a5fa; }
        .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
        .modal .btn-save { background: #16a34a; border: none; border-radius: 6px; padding: 8px 16px; color: white; font-size: 13px; cursor: pointer; }
        .modal .btn-cancel { background: #374151; border: none; border-radius: 6px; padding: 8px 16px; color: #9ca3af; font-size: 13px; cursor: pointer; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
        .tab { background: #0f1419; border: 1px solid #2d3748; border-radius: 6px; padding: 6px 14px; color: #9ca3af; font-size: 13px; cursor: pointer; }
        .tab.active { background: #1d4ed8; border-color: #1d4ed8; color: white; }
        .tab-content { display: flex; flex-direction: column; gap: 12px; }
        .tab-content.hidden { display: none; }
        .hint { font-size: 12px; color: #6b7280; margin-top: 4px; }
        #credStatus, #projectStatus { margin-top: 12px; font-size: 12px; }
        .project-list { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 24px; }
        .project-list .tag { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; padding: 4px 12px; font-size: 12px; color: #9ca3af; cursor: pointer; }
        .project-list .tag.active { border-color: #60a5fa; color: #60a5fa; }
        .project-list .tag:hover { border-color: #60a5fa; }
    </style>
</head>
<body>
    <div class="header">
        <div class="dot"></div>
        <h1>Infrastructure Agent</h1>
        <select id="projectSelect" onchange="switchProject()"></select>
        <button class="btn-new" onclick="openNewProject()">+ New Project</button>
        <button class="btn-creds" onclick="openCreds()">⚙️ AWS</button>
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="input" placeholder="Ask about your infrastructure..." onkeydown="handleKey(event)"></textarea>
            <button id="sendBtn" onclick="send()">Send</button>
        </div>
    </div>

    <!-- New Project Modal -->
    <div class="modal-overlay" id="newProjectModal">
        <div class="modal">
            <h2>Create New Project</h2>
            <label>Project Name<input type="text" id="projectName" placeholder="e.g. cash-invoice, finfinity"></label>
            <label>AWS Region<input type="text" id="projectRegion" placeholder="us-east-1" value="us-east-1"></label>
            <label>Description (optional)<input type="text" id="projectDesc" placeholder="Brief description of the project"></label>
            <div class="modal-actions">
                <button class="btn-save" onclick="createProject()">Create Project</button>
                <button class="btn-cancel" onclick="closeNewProject()">Cancel</button>
            </div>
            <div id="projectStatus"></div>
        </div>
    </div>

    <!-- AWS Credentials Modal -->
    <div class="modal-overlay" id="credModal">
        <div class="modal">
            <h2>AWS Credentials</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('iam')">IAM User</button>
                <button class="tab" onclick="switchTab('sso')">SSO</button>
                <button class="tab" onclick="switchTab('profile')">Profile</button>
            </div>
            <div class="tab-content" id="tab-iam">
                <label>Access Key ID<input type="text" id="accessKey" placeholder="AKIA..."></label>
                <label>Secret Access Key<input type="password" id="secretKey" placeholder="••••••••"></label>
                <label>Session Token (optional)<input type="text" id="sessionToken" placeholder="For temporary credentials"></label>
                <label>Region<input type="text" id="iamRegion" placeholder="us-east-1" value="us-east-1"></label>
            </div>
            <div class="tab-content hidden" id="tab-sso">
                <label>SSO Start URL<input type="text" id="ssoUrl" placeholder="https://my-org.awsapps.com/start"></label>
                <label>SSO Region<input type="text" id="ssoRegion" placeholder="us-east-1"></label>
                <label>Account ID<input type="text" id="ssoAccount" placeholder="123456789012"></label>
                <label>Role Name<input type="text" id="ssoRole" placeholder="AdministratorAccess"></label>
            </div>
            <div class="tab-content hidden" id="tab-profile">
                <label>Profile Name<input type="text" id="profileName" placeholder="default"></label>
                <p class="hint">Uses profile from ~/.aws/credentials</p>
            </div>
            <div class="modal-actions">
                <button class="btn-save" onclick="saveCreds()">Save & Connect</button>
                <button class="btn-cancel" onclick="closeCreds()">Cancel</button>
            </div>
            <div id="credStatus"></div>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const API_URL = '/api';
        let currentProject = '';

        // Load projects on start
        loadProjects();

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = formatMessage(text);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function formatMessage(text) {
            return text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing'; div.id = 'typing';
            div.innerHTML = '<span></span><span></span><span></span>';
            chat.appendChild(div); chat.scrollTop = chat.scrollHeight;
        }
        function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }

        async function send() {
            const text = input.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            showTyping();
            try {
                const res = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, project: currentProject })
                });
                const data = await res.json();
                hideTyping();
                addMessage(data.response, 'agent');
            } catch (e) {
                hideTyping();
                addMessage('⚠️ Connection error. Make sure backend is running.', 'agent');
            }
            sendBtn.disabled = false;
            input.focus();
        }

        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        // --- Projects ---
        async function loadProjects() {
            try {
                const res = await fetch(`${API_URL}/projects`);
                const data = await res.json();
                const select = document.getElementById('projectSelect');
                select.innerHTML = '';
                data.projects.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.name; opt.textContent = p.name;
                    select.appendChild(opt);
                });
                if (data.projects.length > 0) {
                    currentProject = data.projects[0].name;
                    select.value = currentProject;
                }
            } catch (e) {}
        }

        function switchProject() {
            currentProject = document.getElementById('projectSelect').value;
            chat.innerHTML = '';
            addMessage(`Switched to project: ${currentProject}`, 'agent');
            // Reset conversation
            fetch(`${API_URL}/reset`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ project: currentProject }) });
        }

        function openNewProject() { document.getElementById('newProjectModal').classList.add('show'); }
        function closeNewProject() { document.getElementById('newProjectModal').classList.remove('show'); }

        async function createProject() {
            const name = document.getElementById('projectName').value.trim();
            const region = document.getElementById('projectRegion').value.trim() || 'us-east-1';
            const desc = document.getElementById('projectDesc').value.trim();
            const status = document.getElementById('projectStatus');
            if (!name) { status.style.color = '#ef4444'; status.textContent = 'Project name required'; return; }
            status.style.color = '#eab308'; status.textContent = 'Creating...';
            try {
                const res = await fetch(`${API_URL}/projects`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, region, description: desc })
                });
                const data = await res.json();
                if (data.success) {
                    status.style.color = '#10b981'; status.textContent = '✓ Created!';
                    await loadProjects();
                    document.getElementById('projectSelect').value = name;
                    currentProject = name;
                    setTimeout(closeNewProject, 1000);
                } else { status.style.color = '#ef4444'; status.textContent = '✗ ' + data.error; }
            } catch (e) { status.style.color = '#ef4444'; status.textContent = '✗ Backend not reachable'; }
        }

        // --- AWS Credentials ---
        let activeTab = 'iam';
        function openCreds() { document.getElementById('credModal').classList.add('show'); }
        function closeCreds() { document.getElementById('credModal').classList.remove('show'); }
        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tab).classList.remove('hidden');
        }
        async function saveCreds() {
            let creds = { type: activeTab, project: currentProject };
            if (activeTab === 'iam') {
                creds.accessKey = document.getElementById('accessKey').value;
                creds.secretKey = document.getElementById('secretKey').value;
                creds.sessionToken = document.getElementById('sessionToken').value;
                creds.region = document.getElementById('iamRegion').value;
            } else if (activeTab === 'sso') {
                creds.ssoUrl = document.getElementById('ssoUrl').value;
                creds.ssoRegion = document.getElementById('ssoRegion').value;
                creds.accountId = document.getElementById('ssoAccount').value;
                creds.roleName = document.getElementById('ssoRole').value;
            } else { creds.profile = document.getElementById('profileName').value || 'default'; }
            const status = document.getElementById('credStatus');
            status.style.color = '#eab308'; status.textContent = 'Connecting...';
            try {
                const res = await fetch(`${API_URL}/credentials`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(creds) });
                const data = await res.json();
                if (data.success) { status.style.color = '#10b981'; status.textContent = '✓ ' + data.identity; setTimeout(closeCreds, 1500); }
                else { status.style.color = '#ef4444'; status.textContent = '✗ ' + data.error; }
            } catch (e) { status.style.color = '#ef4444'; status.textContent = '✗ Backend not reachable'; }
        }
    </script>
</body>
</html>
